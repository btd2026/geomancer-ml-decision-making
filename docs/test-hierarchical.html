<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hierarchical Gallery Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Hierarchical Gallery Test</h1>

    <div class="test-section">
        <h3>1. CSS Loading Test</h3>
        <div id="css-test">Testing...</div>
    </div>

    <div class="test-section">
        <h3>2. Gallery Data Loading Test</h3>
        <div id="data-test">Testing...</div>
        <div id="data-info"></div>
    </div>

    <div class="test-section">
        <h3>3. Image Loading Test</h3>
        <div id="image-test">Testing...</div>
        <div id="images"></div>
    </div>

    <script>
        // Test 1: CSS Loading
        const testDiv = document.createElement('div');
        testDiv.className = 'dataset-stack';
        document.body.appendChild(testDiv);
        const styles = window.getComputedStyle(testDiv);

        if (styles.display === 'none' || !styles.backgroundColor) {
            document.getElementById('css-test').innerHTML = '<span class="error">❌ CSS not loading properly</span>';
        } else {
            document.getElementById('css-test').innerHTML = '<span class="success">✅ CSS appears to be loading</span>';
        }
        document.body.removeChild(testDiv);

        // Test 2: Gallery Data
        async function testGalleryData() {
            try {
                const response = await fetch('gallery_data.json');
                const data = await response.json();

                document.getElementById('data-test').innerHTML = '<span class="success">✅ Gallery data loads successfully</span>';
                document.getElementById('data-info').innerHTML = `
                    <p>Datasets: ${Object.keys(data.datasets || {}).length}</p>
                    <p>Runs: ${Object.keys(data.runs || {}).length}</p>
                    <p>File size: ${JSON.stringify(data).length / 1024}KB</p>
                `;

                // Test first dataset structure
                const firstDataset = Object.values(data.datasets || {})[0];
                if (firstDataset && firstDataset.runs && firstDataset.runs.length > 0) {
                    const firstRunId = firstDataset.runs[0];
                    const firstRun = data.runs[firstRunId];

                    if (firstRun && firstRun.image_path) {
                        testImages(firstRun.image_path);
                    } else {
                        document.getElementById('image-test').innerHTML = '<span class="error">❌ Run data missing image_path</span>';
                    }
                } else {
                    document.getElementById('image-test').innerHTML = '<span class="error">❌ Dataset structure invalid</span>';
                }

            } catch (error) {
                document.getElementById('data-test').innerHTML = `<span class="error">❌ Failed to load gallery data: ${error.message}</span>`;
            }
        }

        // Test 3: Image Loading
        function testImages(imagePath) {
            const img = document.createElement('img');
            img.style.maxWidth = '200px';
            img.onload = function() {
                document.getElementById('image-test').innerHTML = '<span class="success">✅ Images load successfully</span>';
                document.getElementById('images').appendChild(img);
            };
            img.onerror = function() {
                document.getElementById('image-test').innerHTML = `<span class="error">❌ Image failed to load: ${imagePath}</span>`;
            };
            img.src = imagePath;
        }

        // Run tests
        testGalleryData();
    </script>
</body>
</html>
