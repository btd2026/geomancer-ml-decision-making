<!DOCTYPE html>
<html>
<head>
    <title>Simple Gallery Test</title>
</head>
<body>
    <h1>Gallery Test</h1>
    <div id="status">Testing...</div>
    <div id="images"></div>

    <script>
        async function test() {
            const statusEl = document.getElementById('status');
            const imagesEl = document.getElementById('images');

            try {
                statusEl.textContent = 'Loading data...';
                const response = await fetch('gallery_data.json');
                const data = await response.json();

                statusEl.textContent = `Loaded ${Object.keys(data.runs).length} runs`;

                // Show first 3 images
                const firstRuns = Object.values(data.runs).slice(0, 3);

                imagesEl.innerHTML = firstRuns.map(run => `
                    <div style="margin: 10px; padding: 10px; border: 1px solid #ccc;">
                        <h3>${run.gallery_run_id}</h3>
                        <p>Path: ${run.image_path}</p>
                        <img src="${run.image_path}" alt="Test" style="max-width: 300px;"
                             onload="console.log('✅ Loaded:', this.src)"
                             onerror="console.error('❌ Failed:', this.src); this.style.border='3px solid red';">
                    </div>
                `).join('');

            } catch (error) {
                statusEl.textContent = `Error: ${error.message}`;
                statusEl.style.color = 'red';
            }
        }

        document.addEventListener('DOMContentLoaded', test);
    </script>
</body>
</html>
